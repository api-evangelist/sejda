alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sejda
serviceCategory: Document Management
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
meters:
- name: api_subscription
  description: Flat monthly HTML-to-PDF API subscription fee per tier.
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - tier
- name: api_requests_per_hour
  description: Requests-per-hour ceiling defining the tier; not billed per call but constrains throughput.
  unit: requests
  aggregation: max
  dimensions:
  - account
  - tier
- name: api_concurrency
  description: Concurrent-request ceiling defining the tier.
  unit: concurrency
  aggregation: max
  dimensions:
  - account
  - tier
- name: self_hosted_subscription
  description: Flat monthly self-hosted HTML-to-PDF deployment fee with no per-hour limit.
  unit: subscription
  aggregation: max
  dimensions:
  - account
- name: app_user_subscription
  description: Per-user web/desktop app subscription (week pass, monthly, or annual).
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track which API tier and how many app seats are active; map flat subscription charges to teams.
- name: Allocation
  description: Tag the API subscription and app seats to the workloads/users that consume them.
- name: Optimization
  description: Right-size the API tier to actual peak requests-per-hour and concurrency; consider self-hosting at high volume; use the AGPLv3 SDK/console where a hosted API is not required.
- name: Accountability
  description: Review subscription tier vs. observed throughput and seat utilization each renewal period.
maintainers:
