modified: '2026-06-25'
reconciled: false
tags:
- PDF
- HTML to PDF
- Document Conversion
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Sejda spend. Unlike usage-metered API platforms, Sejda's HTML
  to PDF API is billed as a flat monthly subscription per tier (capped by
  requests-per-hour and concurrency, not by document count), with a flat-fee
  self-hosted option. The web/desktop PDF apps are billed as flat per-user
  subscriptions (week pass, monthly, annual). The open-source SDK/console carry
  no charge under AGPLv3. Cost optimization is therefore about right-sizing the
  subscription tier to peak request rate and concurrency rather than minimizing
  per-call usage.
notes: >-
  Subscription prices and tier limits are subject to change; verify against the
  Sejda developer and pricing pages during reconciliation.
sources:
- https://www.sejda.com/developers
- https://www.sejda.com/html-pdf-api
